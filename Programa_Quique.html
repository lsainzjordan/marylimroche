<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Interactiva del Límite de Roche</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
        }
        input[type=number] {
            width: 90px;
            padding: 5px;
            font-size: 1em;
            background-color: #444;
            color: #4CAF50;
            border: 1px solid #666;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        .result-box {
            background-color: #111;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin-top: 20px;
            font-size: 1.2em;
            border: 1px solid #4CAF50;
        }
        canvas {
            background-color: #000;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            height: 350px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Límite de Roche (Satélite Fluido)</h2>
        <p>Observa cómo los colores cambian según el material (Gas, Hielo, Roca, Metal).</p>

        <div class="control-group">
            <label>Radio del Planeta (km):</label>
            <div class="input-row">
                <input type="range" id="radio_planeta_slider" min="1000" max="150000" value="6371" step="1">
                <input type="number" id="radio_planeta_num" min="1000" max="150000" value="6371" step="1">
            </div>
        </div>

        <div class="control-group">
            <label>Densidad del Planeta (g/cm³):</label>
            <div class="input-row">
                <input type="range" id="densidad_planeta_slider" min="0.1" max="10" value="5.51" step="0.01">
                <input type="number" id="densidad_planeta_num" min="0.1" max="10" value="5.51" step="0.01">
            </div>
        </div>

        <div class="control-group">
            <label>Densidad del Satélite (g/cm³):</label>
            <div class="input-row">
                <input type="range" id="densidad_satelite_slider" min="0.1" max="10" value="3.34" step="0.01">
                <input type="number" id="densidad_satelite_num" min="0.1" max="10" value="3.34" step="0.01">
            </div>
        </div>

        <div class="result-box">
            Límite de Roche: <br>
            <span id="resultado_roche" style="font-size: 1.5em; color: #4CAF50;">Calculando...</span>
        </div>

        <canvas id="canvasSimulador" width="500" height="350"></canvas>
    </div>

    <script>
        const sliderRp = document.getElementById('radio_planeta_slider');
        const numRp = document.getElementById('radio_planeta_num');
        const sliderDp = document.getElementById('densidad_planeta_slider');
        const numDp = document.getElementById('densidad_planeta_num');
        const sliderDs = document.getElementById('densidad_satelite_slider');
        const numDs = document.getElementById('densidad_satelite_num');
        const resultadoRoche = document.getElementById('resultado_roche');
        const canvas = document.getElementById('canvasSimulador');
        const ctx = canvas.getContext('2d');

        // Función para elegir color según la densidad (material)
        function getColorMaterial(densidad) {
            if (densidad < 1.5) return '#f3a683'; // Gas (Naranja pálido)
            if (densidad < 3.0) return '#778beb'; // Hielo/Agua (Azul claro)
            if (densidad < 6.0) return '#8c7ae6'; // Roca (Púrpura/Grisáceo terrestre)
            return '#d63031';                     // Metal pesado (Rojo hierro)
        }

        function sincronizarYCalcular(event) {
            // Sincronizar inputs
            if (event?.target === sliderRp) numRp.value = sliderRp.value;
            if (event?.target === numRp) sliderRp.value = numRp.value;
            if (event?.target === sliderDp) numDp.value = sliderDp.value;
            if (event?.target === numDp) sliderDp.value = numDp.value;
            if (event?.target === sliderDs) numDs.value = sliderDs.value;
            if (event?.target === numDs) sliderDs.value = numDs.value;

            // Obtener valores
            const Rp = parseFloat(numRp.value) || 0;
            const Dp = parseFloat(numDp.value) || 0.1; 
            const Ds = parseFloat(numDs.value) || 0.1;

            // Fórmula: d = 2.44 * Rp * (Dp / Ds)^(1/3)
            const d = 2.44 * Rp * Math.pow((Dp / Ds), 1/3);
            
            resultadoRoche.textContent = d.toLocaleString(undefined, {maximumFractionDigits: 2}) + " km";

            dibujarSimulacion(Rp, d, Dp, Ds);
        }

        function dibujarSimulacion(radioPlaneta, limiteRoche, densidadPlaneta, densidadSatelite) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (radioPlaneta <= 0 || limiteRoche <= 0) return;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Auto-escalado
            const maxDistancia = Math.max(limiteRoche, radioPlaneta) + (limiteRoche * 0.1); 
            const escala = (canvas.height / 2) * 0.8 / maxDistancia; 
            
            const rPlanetaPx = radioPlaneta * escala;
            const rRochePx = limiteRoche * escala;

            // 1. Dibujar Límite de Roche
            ctx.beginPath();
            ctx.arc(centerX, centerY, rRochePx, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(76, 175, 80, 0.6)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.stroke();

            // 2. Dibujar Planeta con color según densidad
            ctx.beginPath();
            ctx.arc(centerX, centerY, rPlanetaPx, 0, 2 * Math.PI);
            ctx.fillStyle = getColorMaterial(densidadPlaneta);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.setLineDash([]);
            ctx.lineWidth = 1;
            ctx.stroke();

            // Texto "Planeta"
            if (rPlanetaPx > 20) {
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Planeta', centerX, centerY + 4);
            }

            // 3. Dibujar Satélite en el límite de Roche
            const radioSatelitePx = Math.max(8, rPlanetaPx * 0.15); // Tamaño visual para que se vea
            const sateliteX = centerX + rRochePx;
            
            ctx.beginPath();
            ctx.arc(sateliteX, centerY, radioSatelitePx, 0, 2 * Math.PI);
            ctx.fillStyle = getColorMaterial(densidadSatelite);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            // Etiqueta del Satélite
            ctx.fillStyle = '#ffffff';
            ctx.font = '11px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Satélite', sateliteX, centerY - radioSatelitePx - 5);
        }

        const inputs = [sliderRp, numRp, sliderDp, numDp, sliderDs, numDs];
        inputs.forEach(input => input.addEventListener('input', sincronizarYCalcular));

        // Iniciar
        sincronizarYCalcular();
    </script>
</body>
</html>
